name: my_app_residuos
description: "Plataforma digital UNSAAC para la gestión de residuos sólidos en Cusco."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI y diseño
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Almacenamiento
  shared_preferences: ^2.3.2

  # Animaciones
  flutter_animate: ^4.5.0

  # Mapa y ubicación
  google_maps_flutter: ^2.6.1
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  http: ^1.2.2
  mime: ^2.0.0

  # Seguridad y criptografía
  crypto: ^3.0.3
  bcrypt: ^1.1.3
  dart_jsonwebtoken: ^2.13.0

  # Supabase
  supabase_flutter: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true